services:
  paddock:
    image: ghcr.io/stockyard-dev/stockyard-paddock:latest
    ports:
      - "8820:8820"
    environment:
      - PORT=${STOCKYARD_PORT:-8820}
      - DATA_DIR=${STOCKYARD_DATA_DIR:-/data}
      - RETENTION_DAYS=${STOCKYARD_RETENTION_DAYS:-30}
      - PADDOCK_LICENSE_KEY=${STOCKYARD_PADDOCK_LICENSE_KEY:-}
    volumes:
      - paddock-data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8820/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  paddock-data:
    driver: local
